name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build and create DMG
        working-directory: ScreenRotator
        run: bash scripts/create-dmg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ScreenRotator-macOS-${{ github.ref_name }}
          path: ScreenRotator/build/ScreenRotator.dmg

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: windows
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        working-directory: windows
        run: pyinstaller build.spec

      - uses: actions/upload-artifact@v4
        with:
          name: ScreenRotator-Windows-${{ github.ref_name }}
          path: windows/dist/ScreenRotator.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ScreenRotator-macOS-${{ github.ref_name }}
          path: artifacts/macos

      - uses: actions/download-artifact@v4
        with:
          name: ScreenRotator-Windows-${{ github.ref_name }}
          path: artifacts/windows

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos/ScreenRotator.dmg
            artifacts/windows/ScreenRotator.exe
          generate_release_notes: true
