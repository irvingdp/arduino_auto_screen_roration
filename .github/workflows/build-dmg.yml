name: Build DMG

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build and create DMG
        working-directory: ScreenRotator
        run: bash scripts/create-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenRotator-${{ github.ref_name }}
          path: ScreenRotator/build/ScreenRotator.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ScreenRotator/build/ScreenRotator.dmg
          generate_release_notes: true
