<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Auto-Rotation Controller</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Screen Auto-Rotation Controller</h1>
        </header>

        <main>
            <div class="control-panel">
                <div class="form-group">
                    <label for="port-select">Select Arduino Serial Port:</label>
                    <div class="select-container">
                        <select id="port-select" class="form-control">
                            <option value="">-- Please select a serial port --</option>
                        </select>
                        <button id="refresh-ports" class="btn btn-secondary">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="display-select">Select Display to Rotate:</label>
                    <div class="select-container">
                        <select id="display-select" class="form-control">
                            <option value="">-- Please select a display --</option>
                        </select>
                        <button id="refresh-displays" class="btn btn-secondary">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                        <button id="debug-displays" class="btn btn-secondary">
                            <i class="fas fa-bug"></i> Debug Displays
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <button id="toggle-monitoring" class="btn btn-primary">
                        <i class="fas fa-play"></i> Start Monitoring
                    </button>
                </div>
            </div>

            <div class="status-panel">
                <h2>Status</h2>
                <div class="status-item">
                    <span class="status-label">Connection Status:</span>
                    <span id="connection-status" class="status-value">Disconnected</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Received Angle:</span>
                    <span id="received-data" class="status-value">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Last Action:</span>
                    <span id="action-status" class="status-value">-</span>
                </div>
            </div>

            <div class="debug-panel">
                <div class="debug-header">
                    <h2>Debug Log</h2>
                    <div class="debug-controls">
                        <label class="switch">
                            <input type="checkbox" id="debug-toggle">
                            <span class="slider round"></span>
                        </label>
                        <span class="debug-label">Debug Mode</span>
                        <button id="clear-log" class="btn btn-sm btn-secondary">
                            <i class="fas fa-trash"></i> Clear Log
                        </button>
                    </div>
                </div>
                <div id="debug-log" class="debug-log"></div>
            </div>
        </main>

        <footer>
            <p>&copy; 2023 Screen Auto-Rotation Controller</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
